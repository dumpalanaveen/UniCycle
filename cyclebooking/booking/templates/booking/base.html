<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniCycle — University Cycle Booking{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg: #f0f4ff;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --radius: 14px;
            --shadow: 0 4px 20px rgba(37,99,235,0.10);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* NAVBAR */
        nav { background: linear-gradient(135deg, #1e3a8a, #2563eb); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 12px rgba(37,99,235,0.3); position: sticky; top: 0; z-index: 100; }
        .nav-brand { color: white; font-size: 1.4rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-brand span { font-size: 1.5rem; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 7px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .nav-links a:hover { background: rgba(255,255,255,0.15); color: white; }
        .nav-links .btn-logout { background: rgba(255,255,255,0.15); color: white; }
        .nav-links .btn-login { background: white; color: var(--primary); font-weight: 600; }
        .nav-links .btn-login:hover { background: #e8f0fe; }

        /* CONTAINER */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* MESSAGES */
        .messages { margin: 1rem 0; }
        .message { padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        .message.success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .message.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .message.info { background: #dbeafe; color: #1e40af; border-left: 4px solid #2563eb; }

        /* CARDS */
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.5rem; }

        /* CYCLE CARD */
        .cycle-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; }
        .cycle-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(37,99,235,0.18); }
        .cycle-card img { width: 100%; height: 200px; object-fit: cover; }
        .cycle-card-no-img { width: 100%; height: 200px; background: linear-gradient(135deg, #dbeafe, #e0e7ff); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .cycle-card-body { padding: 1.2rem; }
        .cycle-card-body h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .cycle-card-body .cycle-id { font-size: 0.8rem; color: var(--muted); margin: 3px 0 8px; }
        .cycle-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-green { background: #d1fae5; color: #065f46; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-yellow { background: #fef3c7; color: #92400e; }
        .badge-red { background: #fee2e2; color: #991b1b; }

        /* BUTTONS */
        .btn { display: inline-block; padding: 10px 22px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--secondary); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-full { width: 100%; display: block; }
        .btn-danger { background: var(--danger); color: white; }

        /* FORMS */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; color: var(--text); }
        .form-control { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95rem; transition: border 0.2s; outline: none; background: white; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-hint { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

        /* PAGE HEADER */
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; }
        .page-header p { color: var(--muted); margin-top: 4px; }

        /* AUTH FORMS */
        .auth-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 8px 40px rgba(37,99,235,0.15); padding: 2.5rem; width: 100%; max-width: 420px; }
        .auth-card h2 { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
        .auth-card .subtitle { color: var(--muted); text-align: center; margin-bottom: 1.8rem; font-size: 0.9rem; }

        /* COST BADGE */
        .cost-badge { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; display: inline-block; }

        /* PIN DISPLAY */
        .pin-display { display: flex; gap: 12px; justify-content: center; margin: 1rem 0; }
        .pin-digit { width: 60px; height: 70px; background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; box-shadow: 0 4px 15px rgba(37,99,235,0.4); }

        /* QR CODE */
        .qr-wrapper { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: inline-block; border: 3px solid var(--border); }
        .qr-wrapper svg { display: block; width: 200px !important; height: 200px !important; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { font-weight: 700; color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; background: #f8fafc; }
        tr:hover td { background: #f8fafc; }

        /* HERO */
        .hero { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #7c3aed 100%); padding: 4rem 2rem; text-align: center; color: white; }
        .hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; }
        .hero p { font-size: 1.1rem; opacity: 0.9; max-width: 500px; margin: 0 auto 2rem; }
        .rate-pill { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 30px; display: inline-block; font-weight: 600; font-size: 1rem; border: 1px solid rgba(255,255,255,0.3); }

        /* PROFILE */
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); }
        .profile-avatar-placeholder { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #7c3aed); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; font-weight: 700; border: 4px solid var(--primary); }

        /* STATUS */
        .status-pending { color: #d97706; font-weight: 600; }
        .status-confirmed { color: #059669; font-weight: 600; }
        .status-active { color: #2563eb; font-weight: 600; }
        .status-completed { color: #64748b; font-weight: 600; }
        .status-cancelled { color: #ef4444; font-weight: 600; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .nav-brand span { display: none; }
            .pin-digit { width: 50px; height: 60px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand"><span>🚲</span> UniCycle</a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="/">🏠 Home</a>
            <a href="/my-bookings/">📋 My Bookings</a>
            <a href="/profile/">👤 Profile</a>
            {% if user.is_staff %}<a href="/admin/">⚙️ Admin</a>{% endif %}
            <a href="/logout/" class="btn-logout">Logout</a>
        {% else %}
            <a href="/login/" class="btn-login btn">Login</a>
            <a href="/register/" style="color:white;">Register</a>
        {% endif %}
    </div>
</nav>

{% if messages %}
<div class="container">
    <div class="messages">
        {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
</div>
{% endif %}

{% block content %}{% endblock %}
</body>
</html>
